services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      ONBOARD_ALLOWED_ROOT: /workspace
      ONBOARD_CLONE_ROOT: /workspace/.waypoint-clones
      WAYPOINT_STATE_PATH: /data/waypoint.sqlite3
      ONBOARD_TRACE_PATH: /data/traces/waypoint.jsonl
    ports:
      - "8000:8000"
    volumes:
      - waypoint-data:/data
      - waypoint-workspace:/workspace
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  waypoint-data:
  waypoint-workspace:
